<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>PRISM WORKS｜双版本对比入口</title>
    <style>
      * { box-sizing: border-box; }
      html { color-scheme: light; background: #efeee9; }
      body { margin: 0; min-height: 100vh; color: #20231f; background: radial-gradient(circle at 85% 12%, #dfe7e1, transparent 32%), #efeee9; font-family: Arial, "PingFang SC", sans-serif; }
      main { width: min(1120px, calc(100% - 32px)); margin: 0 auto; padding: 64px 0 80px; }
      header { max-width: 720px; margin-bottom: 36px; }
      header span { color: #315f54; font-size: 11px; letter-spacing: .18em; }
      h1 { margin: 14px 0; font: 600 clamp(40px, 7vw, 72px)/1 Georgia, "Songti SC", serif; letter-spacing: -.05em; }
      header p, article p, footer { color: #686c65; line-height: 1.75; }
      section { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 22px; }
      article { overflow: hidden; border: 1px solid #d5d4ce; background: #fff; box-shadow: 0 20px 50px rgba(40, 42, 38, .08); }
      figure { aspect-ratio: 16 / 9; margin: 0; overflow: hidden; background: #171a1f; }
      img { width: 100%; height: 100%; object-fit: cover; }
      .copy { padding: 26px; }
      .copy small { color: #315f54; letter-spacing: .15em; }
      h2 { margin: 10px 0; font: 600 34px/1.1 Georgia, "Songti SC", serif; }
      a { display: inline-flex; margin-top: 8px; padding: 12px 15px; color: #fff; background: #243d35; text-decoration: none; }
      .dark { color: #f4f7ff; border-color: #2d3445; background: #0c1019; }
      .dark p { color: #aab0c2; }
      .dark a { color: #09101a; background: #72f6ff; }
      footer { margin-top: 24px; font-size: 12px; }
      @media (max-width: 720px) { section { grid-template-columns: 1fr; } main { padding-top: 44px; } }
    </style>
  </head>
  <body data-parallel-entry="root">
    <main>
      <header>
        <span>PRISM WORKS / PARALLEL DIRECTIONS</span>
        <h1>两套独立视觉，平行比较。</h1>
        <p>两个版本分别保留自己的页面、图片与设计语言；选择任意方向进入完整预览。</p>
      </header>
      <section aria-label="网站版本选择">
        <article class="dark">
          <figure><img src="dark/media/concept/prism-hero-v2.webp" alt="暗黑科幻版预览" /></figure>
          <div class="copy"><small>VERSION 01 / PRISM DARK</small><h2>暗黑科幻版</h2><p>高对比折光、空间感与更强的产品视觉冲击。</p><a href="dark/index.html">进入暗黑版 ↗</a></div>
        </article>
        <article>
          <figure><img src="clean/media/editorial/fridge-magnets-editorial.webp" alt="干净编辑版预览" /></figure>
          <div class="copy"><small>VERSION 02 / CLEAN EDITORIAL</small><h2>干净编辑版</h2><p>米白纸感、克制配色与稳定的编辑式网格。</p><a href="clean/index.html">进入干净版 ↗</a></div>
        </article>
      </section>
      <footer>这是只读共享预览；表单不会实际提交，两个版本的资源互不混用。</footer>
    </main>
  </body>
</html>
